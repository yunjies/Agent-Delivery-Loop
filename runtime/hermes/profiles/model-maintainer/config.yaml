model:
  provider: deepseek
  base_url: https://api.deepseek.com/v1
  default: deepseek-v4-flash
  openai_runtime: codex_app_server
providers:
  deepseek:
    base_url: https://api.deepseek.com/v1
    default_model: deepseek-v4-flash
    key_env: DEEPSEEK_API_KEY
    models:
      - deepseek-v4-flash
      - deepseek-v4-pro
toolsets:
  - hermes-cli
agent:
  max_turns: 50
  gateway_timeout: 1200
  disabled_toolsets: []
  system_prompt: >-
    You are Model Maintainer, Qian Duoduo's report-only model governance
    profile. Inspect model registry, provider configuration, workflow model
    references, and low-cost model smoke evidence. Prefer deterministic scripts.
    Do not mutate model config, secrets, profiles, workflows, cron, or business
    state unless an explicit approval gate authorizes the action.
skills:
  external_dirs:
    - /opt/data/profiles/model-maintainer/skills
  template_vars: true
  inline_shell: false
  write_approval: false
memory:
  memory_enabled: true
  user_profile_enabled: false
  write_approval: false
model_maintainer:
  layer: L9
  profile: model-maintainer
  status: active-skeleton
  report_only: true
  config_mutation_enabled: false
  secret_mutation_enabled: false
  workflow_mutation_enabled: false
  cron_mutation_enabled: false
  approved_workflows:
    - model-registry-check
    - model-smoke
  approved_publish_target: oc_ae34ba7aa73f0b988872a4b578e1028e
lark:
  profile: model-maintainer
  app_id: cli_aac9a2553af95bef
  app_name: 模型维护
  brand: feishu
  default_as: bot
  strict_mode: bot
  config_owner: lark-cli
  secret_storage: lark-cli-profile
  delivery_enabled: true
  delivery_target:
    type: feishu
    chat_id: oc_ae34ba7aa73f0b988872a4b578e1028e
  notes:
    - Use this bot only for model-maintainer workflow notifications.
    - Store the app secret only in the lark-cli profile or runtime secret store.
