apiVersion: hermes.workflow/v2
kind: Workflow
metadata:
  id: model-registry-check
  version: 1.0.0-framework-maintainer
  labels:
    profile: framework-maintainer
    domain: model-governance
    purpose: report-only-model-registry
schedule:
  mode: manual
  enabled: false
runtime:
  max_concurrency: 1
model_policy:
  rule: "Deterministic script collects model registry state; framework-maintainer publishes."
nodes:
  - id: collect-model-registry
    type: script
    depends_on: []
    executor:
      kind: script
      command: python3
      args:
        - /opt/data/profiles/framework-maintainer/scripts/framework_model_registry_check.py
      timeout_seconds: 180
    permissions:
      docs_live_write: false
      feishu_send: false
      cron_mutation: false
      workflow_mutation: false
      rename_delete_move: false
    outputs:
      schema_ref: "#/schemas/collect_result"
schemas:
  collect_result:
    type: object
