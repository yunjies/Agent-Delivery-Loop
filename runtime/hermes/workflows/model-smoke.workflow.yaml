apiVersion: hermes.workflow/v2
kind: Workflow
metadata:
  id: model-smoke
  version: 1.0.0-framework-maintainer
  labels:
    profile: framework-maintainer
    domain: model-governance
    purpose: low-cost-model-smoke
schedule:
  mode: manual
  enabled: false
runtime:
  max_concurrency: 1
model_policy:
  rule: "Run only when requested or during rollout; it performs a small live model call."
nodes:
  - id: run-model-smoke
    type: script
    depends_on: []
    executor:
      kind: script
      command: python3
      args:
        - /opt/data/profiles/framework-maintainer/scripts/framework_model_smoke.py
      timeout_seconds: 240
    permissions:
      docs_live_write: false
      feishu_send: false
      cron_mutation: false
      workflow_mutation: false
      rename_delete_move: false
    outputs:
      schema_ref: "#/schemas/smoke_result"
schemas:
  smoke_result:
    type: object
